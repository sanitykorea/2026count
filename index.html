    /* ── 선관위 텍스트 붙여넣기 파서 ── */
    function parseNECText(text, districtId){
      var rawDs=GBoard.rawDistricts().find(function(x){return x.id===districtId;});
      if(!rawDs) return null;
      var n=rawDs.candidates.length;
      var result={countingRate:0, candidates:rawDs.candidates.map(function(c){
        return {name:c.name,party:c.party,isGreen:c.isGreen,votes:0};
      })};

      // 개표율 (% 기호 있으면 추출)
      var rm=text.match(/(\d{1,3}[.,]\d{1,2})\s*%/);
      if(rm) result.countingRate=parseFloat(rm[1].replace(',','.'));

      /* ── 핵심: 합계/소계 행에서 숫자를 순서대로 추출 ──
         NEC 테이블 구조:
         합계  [선거인수]  [투표수]  [후보1]  [후보2]  ...  [계]  [무효]  [기권]
         후보 득표수는 인덱스 2 부터 시작, n개
         검증: 후보 득표수의 합 == 계(인덱스 2+n)
      ── */
      var lines=text.split(/[\r\n]+/);

      // 합계·소계 행 후보 (숫자가 많은 행 우선)
      var candidates_lines=lines
        .filter(function(l){ return /합계|소계/.test(l) || (l.match(/(\d{1,3}(?:,\d{3})+)/g)||[]).length>=3; })
        .sort(function(a,b){
          return (b.match(/(\d{1,3}(?:,\d{3})+|\d{4,})/g)||[]).length
               - (a.match(/(\d{1,3}(?:,\d{3})+|\d{4,})/g)||[]).length;
        });

      // 여러 행(제주처럼 도시별 2행)을 누적 합산
      var accVotes=result.candidates.map(function(){return 0;});
      var accTotalVotes=0, rowsMatched=0;

      for(var li=0;li<candidates_lines.length;li++){
        var nums=(candidates_lines[li].match(/(\d{1,3}(?:,\d{3})*)/g)||[])
          .map(function(s){return parseInt(s.replace(/,/g,''));})
          .filter(function(v){return v>0;});

        if(nums.length < 2+n) continue;

        var candVotes=nums.slice(2, 2+n);

        // 검증: 합계값(nums[2+n])이 있으면 득표수 합과 10% 이내인지 확인
        if(nums.length > 2+n){
          var sum=candVotes.reduce(function(a,b){return a+b;},0);
          var declared=nums[2+n];
          if(Math.abs(sum-declared)/Math.max(declared,1)>0.1) continue;
        }

        // 누적
        candVotes.forEach(function(v,i){ accVotes[i]+=v; });
        accTotalVotes += nums[1]||0;
        rowsMatched++;
      }

      if(rowsMatched>0){
        accVotes.forEach(function(v,i){
          if(i<result.candidates.length) result.candidates[i].votes=v;
        });
        if(!result.countingRate && accTotalVotes>0){
          var totalCand=accVotes.reduce(function(a,b){return a+b;},0);
          result.countingRate=Math.min(100,Math.round(totalCand/accTotalVotes*1000)/10);
        }
      }
      return result;
    }

    function render(){
      body.innerHTML="";
      GBoard.rawDistricts().forEach(function(d){
        var m=GBoard.getManual(d.id)||{countingRate:0,candidates:d.candidates.map(function(c){return{name:c.name,party:c.party,isGreen:c.isGreen,votes:0};})};
        var box=el("div","gp-dist");
        box.innerHTML='<h4>'+d.title+'</h4><div class="sub">'+d.region+' · '+d.typeLabel+'</div>';

        /* ── 탭: 개별 입력 / 텍스트 붙여넣기 ── */
        var tabs=el("div","gp-tabs");
        var tManual=el("div","gp-tab on","개별 입력");
        var tPaste=el("div","gp-tab","텍스트 붙여넣기");
        tabs.appendChild(tManual); tabs.appendChild(tPaste);
        box.appendChild(tabs);

        /* ── 개별 입력 패널 ── */
        var panelManual=el("div","");

        // 개표율
        var rate=el("div","gp-rate");rate.innerHTML='<label>개표율</label>';
        var ri=el("input","gp-num");ri.type="number";ri.step="0.1";ri.min="0";ri.max="100";
        ri.value=m.countingRate||0;ri.dataset.d=d.id;ri.dataset.k="rate";
        rate.appendChild(ri);rate.appendChild(el("span","gp-hint","%"));
        panelManual.appendChild(rate);

        // 선거인수
        var rVoter=el("div","gp-rate");rVoter.innerHTML='<label>선거인수</label>';
        var iVoter=el("input","gp-num");iVoter.type="number";iVoter.min="0";iVoter.placeholder="선거인수";
        iVoter.value=m.voterCount||0;iVoter.dataset.d=d.id;iVoter.dataset.k="voterCount";
        rVoter.appendChild(iVoter);rVoter.appendChild(el("span","gp-hint","명"));
        panelManual.appendChild(rVoter);

        // 무효투표수
        var rInv=el("div","gp-rate");rInv.innerHTML='<label>무효투표수</label>';
        var iInv=el("input","gp-num");iInv.type="number";iInv.min="0";iInv.placeholder="무효표";
        iInv.value=m.invalidVotes||0;iInv.dataset.d=d.id;iInv.dataset.k="invalid";
        rInv.appendChild(iInv);rInv.appendChild(el("span","gp-hint","표"));
        panelManual.appendChild(rInv);

        // 구분선
        var sep=el("div","");sep.style.cssText="border-top:1px solid #2217140f;margin:8px 0 4px";
        panelManual.appendChild(sep);

        if(d.cityLabels && d.cityLabels.length > 1){
          /* ── 도시별 분리 입력 (제주: 제주시 / 서귀포시) ── */
          d.cityLabels.forEach(function(cityLabel, ci_city){
            var cityData=(m.cityData&&m.cityData[ci_city])||{voterCount:0,invalidVotes:0,votes:{}};
            var cityBox=el("div","");
            cityBox.style.cssText="border:1px solid #2217140f;border-radius:10px;padding:10px 12px;margin-bottom:8px";
            cityBox.innerHTML='<div style="font-size:12px;font-weight:800;color:var(--accent-deep);margin-bottom:8px">'+cityLabel+'</div>';

            // 도시별 선거인수
            var rvc=el("div","gp-rate");rvc.innerHTML='<label style="font-size:11px">선거인수</label>';
            var ivc=el("input","gp-num");ivc.type="number";ivc.min="0";ivc.placeholder="선거인수";
            ivc.value=cityData.voterCount||0;ivc.dataset.d=d.id;ivc.dataset.city=ci_city;ivc.dataset.k="cityVoter";
            rvc.appendChild(ivc);rvc.appendChild(el("span","gp-hint","명"));cityBox.appendChild(rvc);

            // 도시별 무효투표수
            var ric=el("div","gp-rate");ric.innerHTML='<label style="font-size:11px">무효투표수</label>';
            var iic=el("input","gp-num");iic.type="number";iic.min="0";iic.placeholder="무효표";
            iic.value=cityData.invalidVotes||0;iic.dataset.d=d.id;iic.dataset.city=ci_city;iic.dataset.k="cityInvalid";
            ric.appendChild(iic);ric.appendChild(el("span","gp-hint","표"));cityBox.appendChild(ric);

            // 도시별 후보 득표수
            (m.candidates||d.candidates).forEach(function(c,ci){
              var row=el("div","gp-cand");
              row.innerHTML='<div class="nm">'+c.name+(c.isGreen?' <span class="tag">녹색당</span>':' <span class="gp-hint">'+c.party+'</span>')+'</div>';
              var vi=el("input","gp-num");vi.type="number";vi.min="0";vi.placeholder="득표수";
              vi.value=(cityData.votes&&cityData.votes[ci])||0;
              vi.dataset.d=d.id;vi.dataset.city=ci_city;vi.dataset.c=ci;
              row.appendChild(vi);cityBox.appendChild(row);
            });
            panelManual.appendChild(cityBox);
          });
        } else {
          /* ── 일반 단일 입력 ── */
          (m.candidates||[]).forEach(function(c,ci){
            var row=el("div","gp-cand");
            row.innerHTML='<div class="nm">'+c.name+(c.isGreen?' <span class="tag">녹색당</span>':' <span class="gp-hint">'+c.party+'</span>')+'</div>';
            var vi=el("input","gp-num");vi.type="number";vi.min="0";vi.placeholder="득표수";
            vi.value=c.votes||0;vi.dataset.d=d.id;vi.dataset.c=ci;
            row.appendChild(vi);panelManual.appendChild(row);
          });
        }
        box.appendChild(panelManual);

        /* ── 텍스트 붙여넣기 패널 ── */
        var panelPaste=el("div","");panelPaste.style.display="none";
        var hint=el("div","gp-hint","선관위 개표현황 페이지 텍스트를 전체 복사(Ctrl+A, Ctrl+C)하여 붙여넣으세요.");
        hint.style.marginBottom="6px";
        var ta=el("textarea","gp-paste-area");ta.placeholder="여기에 텍스트 붙여넣기...";
        var pr=el("div","gp-parse-result","");
        var bParse=el("button","gp-btn solid","자동 파싱");
        bParse.style.marginTop="8px";
        bParse.onclick=function(){
          var parsed=parseNECText(ta.value, d.id);
          if(!parsed||!parsed.candidates.length){
            pr.className="gp-parse-result err"; pr.textContent="파싱 실패 — 후보자 이름이 텍스트에 없습니다."; return;
          }
          // 파싱 성공 → 개별 입력 필드에 값 채우기
          var rateInput=panelManual.querySelector('input[data-k="rate"]');
          if(rateInput) rateInput.value=parsed.countingRate||0;
          parsed.candidates.forEach(function(c,ci){
            var vi=panelManual.querySelector('input[data-c="'+ci+'"]');
            if(vi) vi.value=c.votes||0;
          });
          var found=parsed.candidates.filter(function(c){return c.votes>0;}).length;
          pr.className="gp-parse-result ok";
          pr.textContent='✓ 파싱 완료 — '+found+'/'+parsed.candidates.length+'명 득표수 인식. 개별 입력 탭에서 확인 후 저장하세요.';
          // 개별 입력 탭으로 전환
          tManual.classList.add("on"); tPaste.classList.remove("on");
          panelManual.style.display=""; panelPaste.style.display="none";
        };
        panelPaste.appendChild(hint);panelPaste.appendChild(ta);panelPaste.appendChild(bParse);panelPaste.appendChild(pr);
        box.appendChild(panelPaste);

        /* ── 탭 전환 ── */
        tManual.onclick=function(){
          tManual.classList.add("on");tPaste.classList.remove("on");
          panelManual.style.display="";panelPaste.style.display="none";
        };
        tPaste.onclick=function(){
          tPaste.classList.add("on");tManual.classList.remove("on");
          panelPaste.style.display="";panelManual.style.display="none";
        };

        body.appendChild(box);
      });
    }
    function saveAll(){
      var byD={};
      GBoard.rawDistricts().forEach(function(d){
        var m=GBoard.getManual(d.id)||{candidates:d.candidates.map(function(c){return{name:c.name,party:c.party,isGreen:c.isGreen,votes:0};})};
        byD[d.id]={countingRate:0,voterCount:0,invalidVotes:0,status:null,
                   cityData: d.cityLabels ? d.cityLabels.map(function(){return {voterCount:0,invalidVotes:0,votes:{}};}) : null,
                   candidates:m.candidates.map(function(c){return{name:c.name,party:c.party,isGreen:c.isGreen,votes:0};})};
      });
      body.querySelectorAll("input").forEach(function(inp){
        var di=+inp.dataset.d; if(isNaN(di)||!byD[di]) return;
        var city=inp.dataset.city;
        if(city!=null){
          var ci_city=+city;
          if(inp.dataset.k==="cityVoter")   byD[di].cityData[ci_city].voterCount=+inp.value||0;
          else if(inp.dataset.k==="cityInvalid") byD[di].cityData[ci_city].invalidVotes=+inp.value||0;
          else if(inp.dataset.c!=null)  byD[di].cityData[ci_city].votes[+inp.dataset.c]=(byD[di].cityData[ci_city].votes[+inp.dataset.c]||0)+(+inp.value||0);
        } else {
          if(inp.dataset.k==="rate")       byD[di].countingRate=+inp.value||0;
          else if(inp.dataset.k==="voterCount") byD[di].voterCount=+inp.value||0;
          else if(inp.dataset.k==="invalid")    byD[di].invalidVotes=+inp.value||0;
          else if(inp.dataset.c!=null)     byD[di].candidates[+inp.dataset.c].votes=+inp.value||0;
        }
      });

      // 도시별 데이터 합산 (제주)
      GBoard.rawDistricts().forEach(function(d){
        if(!d.cityLabels||!byD[d.id].cityData) return;
        var totalVoter=0, totalInvalid=0;
        var candVotes=byD[d.id].candidates.map(function(){return 0;});
        byD[d.id].cityData.forEach(function(cd){
          totalVoter+=cd.voterCount||0;
          totalInvalid+=cd.invalidVotes||0;
          Object.keys(cd.votes).forEach(function(ci){ candVotes[+ci]+=(cd.votes[ci]||0); });
        });
        byD[d.id].voterCount=totalVoter;
        byD[d.id].invalidVotes=totalInvalid;
        byD[d.id].candidates.forEach(function(c,i){ c.votes=candVotes[i]||0; });
        // 도시별 원본 보존
        var m=GBoard.getManual(d.id)||{};
        m.cityData=byD[d.id].cityData;
      });
      Object.keys(byD).forEach(function(id){GBoard.setManual(+id,byD[id]);});

      // 서버 오버라이드 업데이트 → 모든 클라이언트에 반영
      var payload=Object.keys(byD).map(function(id){
        var d=byD[id];
        var total=d.candidates.reduce(function(s,c){return s+(+c.votes||0);},0);
        var cands=d.candidates.map(function(c){
          return {name:c.name,party:c.party,votes:+c.votes||0,
                  pct:total>0?(+c.votes||0)/total*100:0,isGreen:!!c.isGreen};
        });
        cands.sort(function(a,b){return b.votes-a.votes;});
        cands.forEach(function(c,i){c.rank=i+1;});
        var rate=Math.max(0,Math.min(100,+d.countingRate||0));
        return {id:+id,countingRate:rate,
                voterCount:+d.voterCount||0,
                invalidVotes:+d.invalidVotes||0,
                status:rate<0.5?'집계전':rate<99.5?'개표중':'개표완료',
                candidates:cands};
      });
      fetch('/api/override',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:ADMIN_PW_CACHE,payload:payload})})
      .catch(function(){});
    }
    modal._render=render;modal._save=saveAll;
  }
  function flash(elm,msg){elm.textContent=msg;elm.style.color="#00794d";setTimeout(function(){elm.textContent="";},2200);}
  function openEditor(){if(GBoard.getMode()!=="manual")GBoard.setMode("manual");if(!modal)buildModal();modal._render();modal.classList.add("open");}
  function close(){if(modal)modal.classList.remove("open");}

  /* ── 크롤링 설정 모달 ───────────────────────────────────── */
  var cmodal=null;
  function buildCrawl(){
    cmodal=el("div","gp-modal");
    var sheet=el("div","gp-sheet");
    var head=el("div","gp-mh",'<div><h3>크롤링 설정</h3><p>선관위 데이터를 가져올 서버 URL과 갱신 주기를 설정합니다.</p></div>');
    var x=el("button","gp-x","×");head.appendChild(x);
    var body=el("div","gp-body");
    var callout=el("div","gp-callout",'✅ 기본값: <code>/api/gboard</code> (같은 서버의 server.py)<br>별도 엔드포인트가 있다면 아래에 입력하세요.');
    var fUrl=el("div","gp-field");fUrl.innerHTML='<label>데이터 주소 (JSON)</label><span class="h">개표 결과를 반환하는 엔드포인트 URL</span>';
    var iUrl=el("input");iUrl.type="url";iUrl.placeholder="/api/gboard";fUrl.appendChild(iUrl);
    var fInt=el("div","gp-field");fInt.innerHTML='<label>갱신 주기 (초)</label>';
    var iInt=el("input");iInt.type="number";iInt.min="10";iInt.value="60";iInt.style.maxWidth="120px";fInt.appendChild(iInt);
    var callout2=el("div","gp-callout warn",'⚠ 브라우저 보안정책(CORS)상 네이버·선관위를 직접 크롤링할 수 없습니다.<br>server.py 가 CORS를 허용하며 선관위 데이터를 대신 가져옵니다.');
    var help=el("div","gp-field");help.innerHTML='<label>응답 JSON 형식</label>';
    var code=el("div","gp-code");
    code.textContent='[\n  {"id":0,"countingRate":64.5,"status":"개표중",\n   "candidates":[{"name":"허승규","party":"녹색당","votes":7180},...]},\n  {"id":1,...}, {"id":2,...}\n]';
    help.appendChild(code);
    var testLine=el("div","gp-test","");
    var logLabel=el("div","gp-field");logLabel.innerHTML='<label>크롤링 로그</label>';
    var logArea=el("div","gp-code");logArea.id="gpCrawlLog";logArea.style.cssText="max-height:130px;overflow-y:auto;font-size:10.5px;line-height:1.6";
    logLabel.appendChild(logArea);
    body.appendChild(callout);body.appendChild(fUrl);body.appendChild(fInt);body.appendChild(callout2);body.appendChild(help);body.appendChild(testLine);body.appendChild(logLabel);
    var foot=el("div","gp-foot");
    var hint=el("div","gp-hint","");
    var bTest=el("button","gp-btn","연결 테스트");
    var bSave=el("button","gp-btn solid","저장 후 적용");
    foot.appendChild(hint);foot.appendChild(bTest);foot.appendChild(bSave);
    sheet.appendChild(head);sheet.appendChild(body);sheet.appendChild(foot);
    cmodal.appendChild(sheet);document.body.appendChild(cmodal);
    x.onclick=function(){cmodal.classList.remove("open");};
    cmodal.onclick=function(e){if(e.target===cmodal)cmodal.classList.remove("open");};
    bTest.onclick=function(){
      testLine.textContent="테스트 중…";testLine.style.color="#22171499";
      GBoard.testCrawl(iUrl.value.trim()).then(function(r){
        testLine.style.color="#00794d";testLine.textContent="✓ 정상 — 선거구 "+r.count+"개 파싱됨";
      }).catch(function(e){
        testLine.style.color="#c2410c";
        var m=String(e&&e.message||e);
        if(/Failed to fetch|NetworkError/i.test(m)) m="연결 실패. server.py 실행 여부를 확인하세요.";
        testLine.textContent="✕ "+m;
      });
    };
    bSave.onclick=function(){
      GBoard.setCrawl({url:iUrl.value.trim(),interval:+iInt.value||60});
      flash(hint,"저장되었습니다 ✓");
    };
    cmodal._sync=function(){
      var c=GBoard.getCrawl();iUrl.value=c.url||"/api/gboard";iInt.value=c.interval||60;testLine.textContent="";
      var logEl=document.getElementById('gpCrawlLog');
      if(logEl){
        var logs=GBoard.getLogs();
        logEl.textContent=logs.length?logs.map(function(l){return l.t+' '+(l.ok?'✓':'✕')+' '+l.msg;}).join('\n'):'(로그 없음)';
        logEl.scrollTop=logEl.scrollHeight;
      }
    };
  }
  function openCrawl(){if(GBoard.getMode()!=="crawl")GBoard.setMode("crawl");if(!cmodal)buildCrawl();cmodal._sync();cmodal.classList.add("open");}

  return {mount:mount, openEditor:openEditor, openCrawl:openCrawl};
})();
</script>

<script>
/* ── 관리자 인증 ───────────────────────────────────────────── */
var ADMIN_KEY = 'gboard_admin_ok';

function isAdmin(){ return !!sessionStorage.getItem(ADMIN_KEY); }

function openAdminModal(){
  document.getElementById('adminModal').classList.add('open');
  document.getElementById('adminPwInput').value='';
  document.getElementById('adminErr').textContent='';
  setTimeout(function(){ document.getElementById('adminPwInput').focus(); }, 100);
}
function closeAdminModal(){ document.getElementById('adminModal').classList.remove('open'); }

function submitAdminLogin(){
  var pw = document.getElementById('adminPwInput').value;
  fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok){
        sessionStorage.setItem(ADMIN_KEY, '1');
        sessionStorage.setItem(ADMIN_KEY+'_pw', pw);  // 비밀번호 캐시 (세션 한정)
        closeAdminModal();
        location.reload();
      } else {
        document.getElementById('adminErr').textContent = '비밀번호가 틀렸습니다.';
        document.getElementById('adminPwInput').select();
      }
    })
    .catch(function(){
      document.getElementById('adminErr').textContent = '서버 연결 실패. server.py를 실행하세요.';
    });
}
function adminLogout(){ sessionStorage.removeItem(ADMIN_KEY); location.reload(); }

// Enter 키 처리
document.getElementById('adminPwInput').addEventListener('keydown', function(e){ if(e.key==='Enter') submitAdminLogin(); });
// 모달 배경 클릭 닫기
document.getElementById('adminModal').addEventListener('click', function(e){ if(e.target===this) closeAdminModal(); });
// 로고 더블클릭 → 관리자 로그인
document.getElementById('brandLogo').addEventListener('dblclick', function(){ if(!isAdmin()) openAdminModal(); });

/* ── 컨트롤 바 마운트 ─────────────────────────────────────── */
var ADMIN_PW_CACHE = '';  // 반드시 IIFE보다 먼저 선언

(function(){
  var ci = document.getElementById('controlsIn');
  if(isAdmin()){
    document.body.classList.add('admin-active');
    ADMIN_PW_CACHE = sessionStorage.getItem(ADMIN_KEY+'_pw') || '';
    GPanel.mount(ci);
    // 관리자: 투표율 편집 영역 표시
    document.getElementById('turnoutEditArea').style.display = '';
  } else {
    document.querySelector('.controls').style.display = 'none';
  }
})();

/* ── 후보 사진 업로드 (서버 저장 → 전체 동기화) ─────────── */

/* ── 투표율 수동 입력 ── */
function saveTurnoutManual(){
  var rate = parseFloat(document.getElementById('turnoutRateIn').value);
  var asOf = document.getElementById('turnoutAsOfIn').value.trim();
  if(isNaN(rate)||rate<0||rate>100){ alert('0~100 사이 숫자를 입력하세요.'); return; }
  fetch('/api/turnout/manual',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:ADMIN_PW_CACHE, rate:rate, asOf:asOf})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){
      var el=document.getElementById('turnoutInfo');
      if(el) el.innerHTML='투표율 <b style="font-size:15px">'+rate.toFixed(1)+'%</b>'+
        (asOf?'<br><span style="opacity:.7;font-weight:600;font-size:11px">'+asOf+' 기준</span>':'');
    }
  })
  .catch(function(){ alert('저장 실패'); });
}
function clearTurnoutManual(){
  fetch('/api/turnout/manual',{
    method:'DELETE', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:ADMIN_PW_CACHE})
  })
  .then(function(){
    document.getElementById('turnoutRateIn').value='';
    document.getElementById('turnoutAsOfIn').value='';
    fetchTurnout(); // 자동 크롤링으로 복귀
  })
  .catch(function(){});
}

/* ── 선거구별 모드 전환 ── */
function setDistrictMode(id, force){
  GBoard.setDistrictForce(id, force);
  // 크롤 모드에서 모든 선거구가 자동(null)으로 돌아가면 서버 오버라이드 해제
  if(force === null && GBoard.getMode() === 'crawl' && ADMIN_PW_CACHE){
    var allAuto = [0,1,2].every(function(i){ return GBoard.getDistrictForce(i) === null; });
    if(allAuto){
      fetch('/api/override',{method:'DELETE',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:ADMIN_PW_CACHE})}).catch(function(){});
    }
  }
}

function triggerPhotoUpload(id){
  document.getElementById('aPhotoFile-'+id).click();
}
function handlePhotoUpload(id, input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var dataUrl = e.target.result;
    // 서버에 업로드
    if(!ADMIN_PW_CACHE){
      alert('비밀번호가 캐시되지 않았습니다.\n로그아웃 후 다시 로그인해 주세요.');
      return;
    }
    fetch('/api/photos/'+id, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: ADMIN_PW_CACHE, data: dataUrl})
    })
    .then(function(r){
      if(r.status === 403) throw new Error('비밀번호 오류 (로그아웃 후 재로그인)');
      if(r.status === 413) throw new Error('파일이 너무 큽니다 (20MB 이하)');
      return r.json();
    })
    .then(function(d){
      if(d.ok){
        var ph = document.getElementById('aPhoto-'+id);
        if(ph) ph.innerHTML = '<img src="'+dataUrl+'">';
      } else {
        alert('업로드 실패: ' + (d.error || '알 수 없는 오류'));
      }
    })
    .catch(function(e){ alert('업로드 오류: ' + e.message); });
  };
  reader.readAsDataURL(file);
}

// 서버에서 사진 불러오기 (모든 클라이언트 공통)
function fetchPhotos(){
  fetch('/api/photos', {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(photos){
      Object.keys(photos).forEach(function(id){
        var ph = document.getElementById('aPhoto-'+id);
        if(ph && photos[id]){
          ph.innerHTML = '<img src="'+photos[id]+'">';
        }
      });
    })
    .catch(function(){});
}
fetchPhotos();
setInterval(fetchPhotos, 15000);

// 실제 후보자 데이터 로드 (NEC 후보자 명부)
(function loadRealCandidates(){
  fetch('/api/candidates',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      var updated=false;
      data.forEach(function(d){
        if(d.ok && d.candidates && d.candidates.length>0){
          GBoard.updateCandidates(d.id, d.candidates);
          updated=true;
        }
      });
      if(updated) console.log('[candidates] 실제 후보자 데이터 로드 완료');
    })
    .catch(function(e){ console.warn('[candidates] 로드 실패:', e); });
})();

/* ── 메인 렌더 ────────────────────────────────────────────── */
(function(){
  var grid = document.getElementById('grid');

  var built = false;

  function build(snap){
    snap.districts.forEach(function(ds){
      var card = document.createElement('div');
      card.className = 'card';
      card.id = 'aCard-'+ds.id;

      // 당선 예측 섹션 (지역구만 — PR은 의석 배분으로 대체)
      var predHTML = '';
      if(ds.type !== 'pr'){
        predHTML =
          '<div class="pred-section" id="aPred-'+ds.id+'">'+
            '<div class="pred-label-row">'+
              '<span class="pred-tag" id="aPredTag-'+ds.id+'">—</span>'+
              '<span class="pred-rank" id="aPredRank-'+ds.id+'"></span>'+
            '</div>'+
            '<div class="pred-detail" id="aPredDetail-'+ds.id+'"></div>'+
            '<div class="pred-bar-wrap"><div class="pred-bar-fill" id="aPredBar-'+ds.id+'" style="width:0%"></div></div>'+
          '</div>';
      }

      // 제주(PR)에만 의석 배분 섹션 추가
      var seatAllocHTML = '';
      if(ds.type === 'pr'){
        seatAllocHTML =
          '<div class="seat-alloc" id="aSeatAlloc-'+ds.id+'">' +
          '<div class="seat-head"><span class="sh-title">예상 의석 배분</span><span>비례 '+(ds.prSeats||13)+'석</span></div>' +
          '<div class="seat-grid" id="aSeatGrid-'+ds.id+'"><div class="seat-pending">개표 시작 후 표시됩니다</div></div>' +
          '</div>';
      }

      card.innerHTML =
        '<div class="c-head">'+
          '<div class="c-region" id="cRegion-'+ds.id+'"></div>'+
          '<span class="c-cons" id="aCons-'+ds.id+'"></span>'+
          (!ds.hideTypeLabel ? '<span class="c-type">'+ds.typeLabel+'</span>' : '')+
        '</div>'+
        '<div class="hero">'+
          '<div class="hero-photo-wrap">'+
            '<div class="hero-photo" id="aPhoto-'+ds.id+'">녹</div>'+
            '<button class="photo-upload-btn" onclick="triggerPhotoUpload('+ds.id+')" title="사진 업로드">사진</button>'+
            '<input type="file" id="aPhotoFile-'+ds.id+'" accept="image/*" style="display:none" onchange="handlePhotoUpload('+ds.id+',this)">'+
          '</div>'+
          '<div class="hero-body">'+
            '<div class="hero-name" id="aHn-'+ds.id+'">—</div>'+
            '<div class="hero-party" id="aHp-'+ds.id+'">녹색당</div>'+
            '<div class="hero-pct"><div class="num" id="aHpct-'+ds.id+'">—</div>'+
              '<div class="votes" id="aHv-'+ds.id+'"></div></div>'+
            '<div id="aBadge-'+ds.id+'" class="badge in" style="display:none">—</div>'+
            '<div class="seat-note" id="aSeat-'+ds.id+'"></div>'+
          '</div>'+
        '</div>'+
        predHTML +
        seatAllocHTML +
        '<div class="crate"><div class="crate-top"><span class="l">개표율</span>'+
          '<span class="v" id="aRate-'+ds.id+'">—</span></div>'+
          '<div class="crate-bar"><div class="crate-fill" id="aBar-'+ds.id+'"></div></div></div>'+
        '<div class="clist" id="aList-'+ds.id+'"></div>'+
        '<div class="district-mode-bar" id="aDmBar-'+ds.id+'">'+
          '<span style="font-size:10.5px;font-weight:700;color:var(--ink-soft);align-self:center">선거구 모드:</span>'+
          '<button class="dm-btn" id="aDmCrawl-'+ds.id+'" onclick="setDistrictMode('+ds.id+',null)">🔄 자동</button>'+
          '<button class="dm-btn" id="aDmManual-'+ds.id+'" onclick="setDistrictMode('+ds.id+',\'manual\')">✏️ 수동</button>'+
          '<button class="dm-btn" id="aDmError-'+ds.id+'" onclick="setDistrictMode('+ds.id+',\'error\')">⛔ 오류</button>'+
        '</div>'+
        '<div class="c-foot"><span class="c-status" id="aSt-'+ds.id+'"><span class="sd-dot"></span>—</span>'+
          '<span id="aTot-'+ds.id+'"></span></div>';
      grid.appendChild(card);
    });
    built = true;
  }

  /* 제주 의석 배분 렌더 */
  function renderSeatAlloc(ds){
    var gridEl = document.getElementById('aSeatGrid-'+ds.id);
    if(!gridEl) return;

    if(ds.status === '집계전'){
      gridEl.innerHTML = '<div class="seat-pending">개표 시작 후 표시됩니다</div>';
      return;
    }

    var seatResult = ds.seatCalc || GBoard.calcSeats(ds.candidates, ds.prSeats||13);
    var sorted = seatResult.slice().sort(function(a,b){ return b.seats!==a.seats?(b.seats-a.seats):(b.pct-a.pct); });

    var eligible = sorted.filter(function(p){ return p.elig; });
    var below = sorted.filter(function(p){ return !p.elig && p.pct > 0; });

    var eligHTML = eligible.map(function(p){
      var col = GBoard.colorOf(p.party, 0);
      var dots = '';
      for(var i=0;i<Math.max(p.seats,0);i++){
        dots += '<span class="sd" style="background:'+col+'"></span>';
      }
      if(!dots) dots = '<span class="sd empty"></span>';
      var greenClass = p.isGreen ? ' gr' : '';
      var cntText = p.seats > 0 ? p.seats+'석' : '—';
      return '<div class="seat-row'+greenClass+'">'+
        '<span class="seat-party">'+p.name+'</span>'+
        '<span class="seat-dots">'+dots+'</span>'+
        '<span class="seat-cnt">'+cntText+'</span>'+
        '</div>';
    }).join('');

    var belowHTML = '';
    if(below.length > 0){
      belowHTML = '<div class="seat-below-group">5% 미만: '+
        below.map(function(p){
          var col = p.isGreen ? 'var(--accent-deep)' : 'inherit';
          return '<span style="color:'+col+'">'+p.name+' '+p.pct.toFixed(1)+'%</span>';
        }).join(' · ')+'</div>';
    }

    gridEl.innerHTML = eligHTML + belowHTML;
  }

  function render(snap){
    if(!built) build(snap);

    snap.districts.forEach(function(ds){
      var g = ds.green;
      var rawDs = GBoard.rawDistricts().find(function(rd){ return rd.id===ds.id; });

      // 헤더: headerTitle 강조, 제주는 region 숨김
      var rawDs2 = GBoard.rawDistricts().find(function(rd){ return rd.id===ds.id; });
      var regionEl = document.getElementById('cRegion-'+ds.id);
      if(rawDs2 && rawDs2.hideTypeLabel){
        regionEl.textContent = '';
      } else {
        regionEl.textContent = ds.region.split(' ')[0];
      }
      document.getElementById('aCons-'+ds.id).textContent = (rawDs2 && rawDs2.headerTitle) ? rawDs2.headerTitle : ds.title;

      // 영웅 이름: PR 선거구는 DISTRICTS의 candidateName 사용
      var heroName = '—';
      if(g){
        heroName = g.name;
        if(ds.type==='pr' && rawDs){
          var localGreen = rawDs.candidates.find(function(c){ return c.isGreen; });
          if(localGreen && localGreen.candidateName) heroName = localGreen.candidateName;
        }
      }
      document.getElementById('aHn-'+ds.id).textContent = heroName;
      document.getElementById('aHp-'+ds.id).textContent = ds.type==='pr'?'광역의회 비례대표 · 정당투표':'녹색당';
      document.getElementById('aHpct-'+ds.id).innerHTML = g?(g.pct.toFixed(1)+'<span class="u">%</span>'):'—';
      document.getElementById('aHv-'+ds.id).textContent = g&&g.votes?(g.votes.toLocaleString()+'표 · '+g.rank+'위'):'';

      // 배지: 당선/당선권만 표시, 부정 레이블 없음
      var badge = document.getElementById('aBadge-'+ds.id);
      if(ds.win.state==='in' && ds.win.label){
        badge.style.display = '';
        badge.className = 'badge in';
        badge.textContent = ds.win.label;
      } else {
        badge.style.display = 'none';
      }

      // 의석 노트
      document.getElementById('aSeat-'+ds.id).textContent = ds.win.seatText||'';

      // 개표율
      document.getElementById('aRate-'+ds.id).textContent = ds.countingRate.toFixed(1)+'%';
      document.getElementById('aBar-'+ds.id).style.width = ds.countingRate+'%';

      // 당선 예측 (지역구만)
      if(ds.type!=='pr') renderPrediction(ds, rawDs);
      // 의석 배분 (PR만)
      if(ds.type==='pr') renderSeatAlloc(ds);

      // 후보 목록
      var list = document.getElementById('aList-'+ds.id);
      if(ds.status==='데이터 수신 실패'){
        list.innerHTML='<div class="error-card-notice">⛔ 데이터 수신 실패<br><span style="font-size:11px;font-weight:600;color:var(--ink-soft)">수동 입력 또는 크롤링 재시도 필요</span></div>';
      } else if(ds.status==='집계전'){
        // 집계전이어도 DISTRICTS에 후보 정보가 있으면 0표로 미리 표시
        var preCands = rawDs ? rawDs.candidates : [];
        if(preCands.length > 0){
          list.innerHTML = preCands.map(function(c,i){
            var col = GBoard.colorOf(c.party, i);
            var bNum = c.number || '';
            return '<div class="crow'+(c.isGreen?' green':'')+'">'+
              '<div class="crow-top"><span class="rk">'+bNum+'</span>'+
                '<span class="nm">'+c.name+'</span>'+
                '<span class="pty">'+(ds.type==='pr'?'':c.party)+'</span>'+
                '<span class="sp"><span class="pc" style="color:#ccc">—%</span>'+
                '<span class="vt" style="color:#ccc">집계전</span></span></div>'+
              '<div class="crow-bar"><div class="crow-fill" style="width:0%;background:'+col+'"></div></div>'+
            '</div>';
          }).join('');
        } else {
          list.innerHTML='<div class="empty"><div class="big">개표 시작 전</div><div class="sm">개표가 시작되면 실시간으로 표시됩니다</div></div>';
        }
      } else {
        // 이름 → 기호 매핑
        var numMap={};
        if(rawDs) rawDs.candidates.forEach(function(rc){ if(rc.number) numMap[rc.name]=rc.number; });
        var maxP=Math.max.apply(null,ds.candidates.map(function(c){return c.pct;}).concat([1]));
        list.innerHTML=ds.candidates.map(function(c,i){
          var col=GBoard.colorOf(c.party,i);
          var w=maxP>0?(c.pct/maxP*100):0;
          var bNum=numMap[c.name]||'';
          return '<div class="crow'+(c.isGreen?' green':'')+'">'+
            '<div class="crow-top"><span class="rk">'+bNum+'</span>'+
              '<span class="nm">'+c.name+'</span>'+
              '<span class="pty">'+(ds.type==='pr'?'':c.party)+'</span>'+
              '<span class="sp"><span class="pc" style="color:'+col+'">'+c.pct.toFixed(1)+'%</span>'+
              '<span class="vt">'+(c.votes?c.votes.toLocaleString():'0')+'</span></span></div>'+
            '<div class="crow-bar"><div class="crow-fill" style="width:'+w+'%;background:'+col+'"></div></div>'+
          '</div>';
        }).join('');
      }

      // 푸터
      var st=document.getElementById('aSt-'+ds.id);
      var isError = ds.status==='데이터 수신 실패';
      st.className='c-status'+(ds.status==='개표완료'?' done':'')+(isError?' done':'');
      st.innerHTML='<span class="sd-dot" style="'+(isError?'background:#dc2626':'')+'"></span>'+ds.status;
      var totText = ds.totalVotes ? '총 '+ds.totalVotes.toLocaleString()+(ds.type==='pr'?' (정당)':'표') : '';
      if(ds.invalidVotes) totText += (totText?' · ':'') + '무효 '+ds.invalidVotes.toLocaleString()+'표';
      document.getElementById('aTot-'+ds.id).textContent = totText;

      // 선거구별 모드 버튼 상태 업데이트 (관리자만 보임)
      var force = GBoard.getDistrictForce(ds.id);
      var bCrawl  = document.getElementById('aDmCrawl-'+ds.id);
      var bManual = document.getElementById('aDmManual-'+ds.id);
      var bError  = document.getElementById('aDmError-'+ds.id);
      if(bCrawl){
        bCrawl.className  = 'dm-btn' + (force===null  ? ' on-crawl'  : '');
        bManual.className = 'dm-btn' + (force==='manual' ? ' on-manual' : '');
        bError.className  = 'dm-btn' + (force==='error'  ? ' on-error'  : '');
      }
    });

    // 푸터 시간 (크롤링: 마지막 수신 시각 / 데모·수동: 마지막 데이터 변경 시각)
    var ft=document.getElementById('footTime');
    if(ft) ft.textContent=snap.lastUpdateTime?'최종 업데이트 '+snap.lastUpdateTime:'';
  }

  var lastCycle=-1;
  GBoard.subscribe(function(snap){
    render(snap);
    if(snap.cycle!==lastCycle){
      lastCycle=snap.cycle;
      snap.districts.forEach(function(ds){
        var c=document.getElementById('aCard-'+ds.id);
        if(c){c.classList.remove('live-pulse');void c.offsetWidth;c.classList.add('live-pulse');setTimeout(function(){c.classList.remove('live-pulse');},1400);}
      });
    }
  });

  /* ── 당선 예측 계산 ────────────────────────────────────────
     방송사 스타일 산식 (2인 선거구 기준)
     - 당선 확정  : 개표 100% + 상위 N위
     - 당선 확실  : 수학적 역전 불가 (격차 > 잔여 추정 투표수)
                   OR 개표 70%+ + 격차 8%p 이상
     - 당선 유력  : 개표 50%+ + 격차 5%p 이상
                   OR 개표 30%+ + 격차 12%p 이상
     - 당선 접전  : 선두권, 격차 작음
     - 낙선 접전  : 낙선권, 격차 작음
     - 낙선 유력  : 개표 50%+ + 열세 5%p 이상
     - 낙선 확실  : 수학적 역전 불가 (역방향) OR 개표 70%+ + 열세 8%p 이상
     - 낙선 확정  : 개표 100% + N위 밖
  ── */
  function calcGreenPrediction(ds, rawDs){
    if(!rawDs || ds.type==='pr') return null;
    var g = ds.green;
    if(!g) return null;
    var seats   = rawDs.seats || 2;
    var cands   = ds.candidates.slice(); // sorted by votes desc
    var greenRk = -1;
    for(var k=0;k<cands.length;k++){ if(cands[k].isGreen){ greenRk=k+1; break; } }
    if(greenRk<0) return null;

    var counting   = ds.countingRate || 0;
    var gVotes     = g.votes;
    var gPct       = g.pct;
    var inZone     = greenRk <= seats;
    var totCounted = cands.reduce(function(s,c){return s+c.votes;},0);

    // 잔여 투표수 추정: 지금까지 집계된 표 / 개표율 * (100-개표율)
    var remaining  = counting>0 ? Math.round(totCounted/counting*(100-counting)) : 0;

    // 경쟁 상대: 당선권 바로 바깥 후보 (0-indexed: seats번째)
    var rival = cands[seats] || null; // 3rd place for 2-seat
    var rVotes = rival ? rival.votes : 0;
    var rPct   = rival ? rival.pct   : 0;

    var gapVotes = gVotes - rVotes; // 양수=녹색 우세, 음수=열세
    var gapPct   = gPct   - rPct;

    var label, color, conf;

    if(counting<=0){
      label='집계전'; color='#9ca3af'; conf=0;
    } else if(counting>=99.9){
      if(inZone){ label='당선 확정'; color='#00a167'; conf=100; }
      else       { label='낙선 확정'; color='#dc2626'; conf=0;   }
    } else if(inZone){
      if(gapVotes>remaining){
        label='당선 확실'; color='#00794d'; conf=98;
      } else if(counting>=70&&gapPct>=8){
        label='당선 확실'; color='#00794d'; conf=95;
      } else if(counting>=50&&gapPct>=5 || counting>=30&&gapPct>=12){
        label='당선 유력'; color='#059669'; conf=80;
      } else if(counting>=20&&gapPct>=2){
        label='당선 접전'; color='#f59e0b'; conf=60;
      } else {
        label='경합';     color='#f59e0b'; conf=55;
      }
    } else {
      return null; // 낙선권은 표기하지 않음
    }

    // 상세 텍스트
    var detail = counting<=0 ? '개표 시작 전' :
      counting>=99.9 ? '개표 완료' :
      (counting.toFixed(1)+'% 개표 · 현재 '+greenRk+'위 / '+seats+'인 선거구' +
       (gapPct!==0 ? ' · '+(gapPct>0?'+':'')+gapPct.toFixed(1)+'%p' : ''));

    return {label:label, color:color, conf:conf, detail:detail,
            rank:greenRk, seats:seats, inZone:inZone, gapPct:gapPct, counting:counting};
  }

  function renderPrediction(ds, rawDs){
    var el = document.getElementById('aPred-'+ds.id);
    if(!el) return;
    var pred = calcGreenPrediction(ds, rawDs);
    if(!pred){ el.style.display='none'; return; }
    el.style.display='';
    var tag    = document.getElementById('aPredTag-'+ds.id);
    var rank   = document.getElementById('aPredRank-'+ds.id);
    var detail = document.getElementById('aPredDetail-'+ds.id);
    var bar    = document.getElementById('aPredBar-'+ds.id);
    tag.textContent    = pred.label;
    tag.style.background = pred.color;
    rank.textContent   = pred.rank+'위 / '+pred.seats+'인';
    detail.textContent = pred.detail;
    bar.style.background = pred.color;
    bar.style.width    = pred.conf+'%';
  }

  /* ── 투표율 현황 ── */
  function fetchTurnout(){
    fetch('/api/turnout',{cache:'no-store'})
      .then(function(r){ return r.json(); })
      .then(function(d){
        var el=document.getElementById('turnoutInfo');
        if(!el) return;
        if(d.rate!=null){
          var manualTag = d.asOf && !d.manual ? '<br><span style="opacity:.7;font-weight:600;font-size:11px">'+d.asOf+' 기준</span>' : '';
          el.innerHTML='투표율 <b style="font-size:15px">'+d.rate.toFixed(1)+'%</b>'+manualTag;
          // 관리자: 현재값 편집 필드에 미리 채우기
          if(isAdmin() && d.manual){
            var ri=document.getElementById('turnoutRateIn');
            var ai=document.getElementById('turnoutAsOfIn');
            if(ri) ri.value=d.rate.toFixed(1);
            if(ai) ai.value=d.asOf||'';
          }
        } else {
          el.innerHTML='<span style="opacity:.6;font-size:11px">투표율 집계 전</span>';
        }
      })
      .catch(function(){ });
  }
  fetchTurnout();
  setInterval(fetchTurnout, 5*60*1000);

  /* ── 모바일 백그라운드 복귀 시 즉시 갱신 ──────────────────
     iOS/Android 브라우저는 백그라운드에서 폴링 타이머를 멈춤.
     화면/탭이 다시 활성화되면 즉시 데이터를 새로 가져온다.
  ── */
  var _lastVisible = Date.now();
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ _lastVisible = Date.now(); return; }
    var away = Date.now() - _lastVisible;
    if(away > 5000){ // 5초 이상 자리 비웠으면 즉시 새로고침
      GBoard.forceRefresh();
      fetchTurnout();
      fetchPhotos();
    }
  });
  // iOS Safari는 visibilitychange 대신 pagehide/pageshow 사용
  window.addEventListener('pageshow', function(e){
    if(e.persisted){ // bfcache에서 복원된 경우
      GBoard.forceRefresh();
      fetchTurnout();
    }
  });
})();
</script>
<script>
/* ── 실시간 채팅 ─────────────────────────────────────────── */
(function(){
  var NICK_KEY  = 'gboard.chat.nick';
  var panel     = document.getElementById('chatPanel');
  var bubble    = document.getElementById('chatBubble');
  var badge     = document.getElementById('chatBadge');
  var msgs      = document.getElementById('chatMsgs');
  var nickIn    = document.getElementById('chatNickIn');
  var textIn    = document.getElementById('chatTextIn');
  var sendBtn   = document.getElementById('chatSend');
  var onlineEl  = document.getElementById('chatOnline');
  var pinnedEl  = document.getElementById('chatPinned');
  var pinnedTxt = document.getElementById('chatPinnedText');
  var pinnedNick= document.getElementById('chatPinnedNick');

  var lastId  = 0;
  var unread  = 0;
  var open    = false;
  var myNick  = localStorage.getItem(NICK_KEY) || '';
  var currentPinnedId = null;

  nickIn.value = myNick;
  nickIn.addEventListener('change', function(){
    myNick = nickIn.value.trim();
    localStorage.setItem(NICK_KEY, myNick);
  });

  /* ── 열기/닫기 ── */
  bubble.addEventListener('click', function(){ open ? closeChat() : openChat(); });
  document.getElementById('chatClose').addEventListener('click', closeChat);

  function openChat(){
    open = true;
    panel.classList.add('open');
    bubble.style.background = 'var(--accent-deep)';
    unread = 0; badge.textContent = ''; badge.classList.remove('show');
    scrollToBottom();
    textIn.focus();
  }
  function closeChat(){
    open = false;
    panel.classList.remove('open');
    bubble.style.background = '';
  }

  /* ── 핀 메시지 렌더 ── */
  function renderPinned(p){
    if(!p || p.id === currentPinnedId && !p){ return; }
    if(!p){ pinnedEl.classList.remove('show'); currentPinnedId=null; return; }
    if(p.id === currentPinnedId) return;
    currentPinnedId = p.id;
    pinnedTxt.textContent  = p.text;
    pinnedNick.textContent = p.nick + ' · ' + p.time;
    pinnedEl.classList.add('show');
  }
  function clearPinned(){
    currentPinnedId = null;
    pinnedEl.classList.remove('show');
  }

  /* ── 메시지 렌더 ── */
  function adminPost(path, body){
    body.password = ADMIN_PW_CACHE;
    return fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }

  function renderMsg(m){
    var isMine  = (m.nick === (myNick||'익명'));
    var isAdmMsg= !!m.isAdmin;
    var div = document.createElement('div');
    div.className = 'chat-msg'+(isMine?' me':'')+(isAdmMsg?' admin-msg':'');
    div.dataset.id = m.id;

    var meta = document.createElement('div');
    meta.className = 'chat-msg-meta';
    if(isAdmMsg){ var tag=document.createElement('span'); tag.className='chat-admin-tag'; tag.textContent='관리자'; meta.appendChild(tag); }
    var nickSpan=document.createElement('span'); nickSpan.textContent=m.nick; meta.appendChild(nickSpan);

    var bub=document.createElement('div'); bub.className='chat-bubble-msg'; bub.textContent=m.text;

    var timeEl=document.createElement('div'); timeEl.className='chat-time'; timeEl.textContent=m.time;

    /* 관리자 모더레이션 버튼 */
    var mod=document.createElement('div'); mod.className='chat-mod';

    var isPinned = (m.id === currentPinnedId);
    var pinBtn=document.createElement('button'); pinBtn.className='chat-mod-btn';
    pinBtn.textContent=isPinned?'📌 핀 해제':'📌 핀';
    pinBtn.onclick=function(){
      var newId = isPinned ? null : m.id;
      adminPost('/api/chat/pin',{id:newId}).then(function(){ poll(); });
    };

    var delBtn=document.createElement('button'); delBtn.className='chat-mod-btn del'; delBtn.textContent='삭제';
    delBtn.onclick=function(){
      if(!confirm('['+m.nick+'] 메시지를 삭제할까요?')) return;
      fetch('/api/chat/'+m.id,{method:'DELETE',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:ADMIN_PW_CACHE})})
      .then(function(){ div.remove(); });
    };

    var blockBtn=document.createElement('button'); blockBtn.className='chat-mod-btn block-btn'; blockBtn.textContent='IP 차단';
    blockBtn.onclick=function(){
      if(!confirm('['+m.nick+'] 의 IP를 차단할까요?\n(같은 IP에서 오는 모든 메시지 차단)')) return;
      adminPost('/api/chat/block',{msgId:m.id,action:'block'})
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.ok) alert('IP 차단됨: '+d.ip); });
    };

    mod.appendChild(pinBtn); mod.appendChild(delBtn); mod.appendChild(blockBtn);

    div.appendChild(meta); div.appendChild(bub); div.appendChild(timeEl); div.appendChild(mod);
    return div;
  }

  function appendMessages(list){
    if(!list.length) return;
    var wasEmpty=msgs.querySelector('.chat-empty');
    if(wasEmpty) wasEmpty.remove();
    var atBottom=msgs.scrollHeight-msgs.scrollTop-msgs.clientHeight<60;
    list.forEach(function(m){
      if(document.querySelector('[data-id="'+m.id+'"]')) return;
      msgs.appendChild(renderMsg(m));
      lastId=Math.max(lastId,m.id);
      if(!open){ unread++; badge.textContent=unread>99?'99+':unread; badge.classList.add('show'); }
    });
    if(atBottom||open) scrollToBottom();
  }

  function scrollToBottom(){ setTimeout(function(){ msgs.scrollTop=msgs.scrollHeight; },30); }

  /* ── 폴링 ── */
  function poll(){
    fetch('/api/chat?since='+lastId,{cache:'no-store'})
      .then(function(r){ return r.json(); })
      .then(function(data){
        onlineEl.textContent='연결됨';
        /* 서버 응답: {messages:[...], pinned:{...}|null} */
        var list   = Array.isArray(data) ? data : (data.messages||[]);
        var pinned = Array.isArray(data) ? null  : data.pinned;
        appendMessages(list);
        if(pinned) renderPinned(pinned);
        else clearPinned();
      })
      .catch(function(){ onlineEl.textContent='연결 끊김…'; });
  }

  poll();
  setInterval(poll, 3000);

  /* ── 전송 ── */
  function send(){
    var text=textIn.value.trim(); if(!text) return;
    var nick=nickIn.value.trim()||'익명';
    myNick=nick; localStorage.setItem(NICK_KEY,nick);
    sendBtn.disabled=true;
    var body={nick:nick,text:text};
    if(isAdmin()) body.password=ADMIN_PW_CACHE;
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){ return r.json(); })
      .then(function(d){ if(d.ok){ textIn.value=''; textIn.style.height=''; poll(); } })
      .catch(function(){})
      .finally(function(){ sendBtn.disabled=false; textIn.focus(); });
  }

  sendBtn.addEventListener('click',send);
  textIn.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
  textIn.addEventListener('input',function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,90)+'px'; });
})();
</script>
</body>
</html>
