<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>녹색당 2026 지방선거 개표 현황판</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --accent:#00a167; --accent-deep:#00794d; --ink:#221714; --ink-soft:#4a3f39;
    --bg:#f3f2ed; --card:#ffffff; --line:#2217141a; --line-soft:#22171410;
    --gp-accent:#00a167; --gp-ink:#221714; --gp-line:#2217141f; --gp-segbg:#fff; --gp-segfg:#221714;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:Pretendard,sans-serif;letter-spacing:-0.04em;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1480px;margin:0 auto;padding:0 clamp(14px,3vw,40px)}

  /* header */
  header.top{background:var(--ink);color:#fff}
  .top-in{max-width:1480px;margin:0 auto;padding:clamp(16px,2.4vw,26px) clamp(14px,3vw,40px);
    display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:13px;cursor:pointer;user-select:none}
  .brand-mark{width:38px;height:38px;border-radius:50%;background:var(--accent);display:grid;place-items:center;
    font-weight:900;color:#fff;font-size:20px;flex:0 0 auto}
  .brand .wm{font-weight:900;font-size:clamp(17px,1.7vw,21px);letter-spacing:-0.05em}
  .brand .wm small{display:block;font-weight:600;font-size:11px;opacity:.7;letter-spacing:-0.02em;margin-top:1px}
  .top-title{font-weight:900;font-size:clamp(22px,2.5vw,34px);letter-spacing:-0.05em;line-height:1.15}
  .top-title b{color:var(--accent);font-weight:900}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .meta-date{font-size:12.5px;font-weight:600;opacity:.78;letter-spacing:-0.02em}
  .live{display:inline-flex;align-items:center;gap:7px;font-weight:900;font-size:13px;letter-spacing:0;
    background:#e0162b;color:#fff;padding:5px 12px;border-radius:999px}
  .live .d{width:7px;height:7px;border-radius:50%;background:#fff;animation:lp 1.5s infinite}
  @keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}

  /* control strip */
  .controls{background:#fff;border-bottom:1px solid var(--line)}
  .controls-in{max-width:1480px;margin:0 auto;padding:11px clamp(14px,3vw,40px);display:flex;align-items:center;gap:10px;flex-wrap:wrap}

  /* viewer strip (non-admin) */
  .viewer-strip{display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;color:var(--ink-soft);flex:1}
  .viewer-cd{font-size:13px;font-weight:800;color:var(--ink);display:inline-flex;align-items:center;gap:7px}
  .viewer-cd .dot{width:8px;height:8px;border-radius:50%;background:#e0162b;animation:gpPulse 1.6s infinite}
  @keyframes gpPulse{0%{box-shadow:0 0 0 0 #e0162b55}70%{box-shadow:0 0 0 7px #e0162b00}100%{box-shadow:0 0 0 0 #e0162b00}}
  .admin-btn{margin-left:auto;appearance:none;border:1.5px solid var(--line);background:transparent;
    font-family:inherit;font-size:12px;font-weight:700;color:var(--ink-soft);padding:5px 12px;
    border-radius:999px;cursor:pointer;transition:.15s}
  .admin-btn:hover{border-color:var(--accent);color:var(--accent)}
  .admin-out{appearance:none;border:0;background:transparent;font-family:inherit;font-size:11px;
    font-weight:700;color:#9a9a9a;padding:4px 8px;border-radius:999px;cursor:pointer;}
  .admin-out:hover{color:#e0162b}

  /* grid */
  main{padding:clamp(18px,2.6vw,34px) 0 60px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,1.4vw,20px)}
  @media(max-width:1080px){.grid{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;
    display:flex;flex-direction:column;transition:box-shadow .3s,border-color .3s}
  .card.live-pulse{box-shadow:0 0 0 2px var(--accent),0 14px 40px #00a16722;border-color:transparent}

  .c-head{padding:14px 18px 13px;border-bottom:1px solid var(--line-soft)}
  .c-region{font-size:11.5px;font-weight:700;color:var(--ink-soft);letter-spacing:-0.02em;margin-bottom:3px}
  .c-cons{display:block;font-size:18px;font-weight:900;color:var(--ink);letter-spacing:-0.045em;line-height:1.15;margin-bottom:7px}
  .c-type{display:inline-block;font-size:11.5px;font-weight:800;letter-spacing:-0.02em;
    background:#2217140d;color:var(--ink-soft);padding:4px 11px;border-radius:7px}

  /* hero green candidate */
  .hero{padding:20px 18px;display:flex;align-items:center;gap:18px;background:
    linear-gradient(180deg,#f4faf6,#ffffff);border-bottom:1px solid var(--line-soft)}
  .hero-photo-wrap{position:relative;flex:0 0 auto}
  .hero-photo{width:106px;height:106px;border-radius:50%;background:#2217140a;border:2.5px solid var(--accent);
    display:grid;place-items:center;overflow:hidden;font-size:36px;color:var(--accent);font-weight:900}
  .hero-photo img{width:100%;height:100%;object-fit:cover}
  .photo-upload-btn{position:absolute;inset:0;border-radius:50%;background:#00000070;color:#fff;
    font-size:11px;font-weight:800;display:none;align-items:center;justify-content:center;
    cursor:pointer;border:0;font-family:inherit;letter-spacing:-.02em;opacity:0;transition:opacity .2s}
  .hero-photo-wrap:hover .photo-upload-btn{opacity:1}
  .admin-active .photo-upload-btn{display:flex}
  .hero-body{flex:1;min-width:0}
  .hero-name{font-size:clamp(23px,2.6vw,30px);font-weight:900;letter-spacing:-0.055em;line-height:1}
  .hero-party{font-size:12px;font-weight:700;color:var(--accent-deep);margin-top:3px}
  .hero-pct{display:flex;align-items:flex-end;gap:9px;margin-top:7px}
  .hero-pct .num{font-size:clamp(40px,5vw,60px);font-weight:900;letter-spacing:-0.06em;line-height:.82;color:var(--accent)}
  .hero-pct .num .u{font-size:.42em;font-weight:800}
  .hero-pct .votes{font-size:12px;font-weight:700;color:var(--ink-soft);padding-bottom:6px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:900;letter-spacing:-0.03em;
    padding:5px 12px;border-radius:999px;margin-top:9px}
  .badge.in{background:var(--accent);color:#fff}
  .seat-note{font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:6px;letter-spacing:-0.03em}

  /* 의석 배분 (제주 전용) */
  .seat-alloc{padding:12px 18px 8px;border-bottom:1px solid var(--line-soft)}
  .seat-head{font-size:10.5px;font-weight:800;color:var(--ink-soft);letter-spacing:-.02em;
    margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .seat-head .sh-title{color:var(--accent-deep)}
  .seat-grid{display:flex;flex-direction:column;gap:4px}
  .seat-row{display:flex;align-items:center;gap:7px}
  .seat-party{font-size:11px;font-weight:700;width:80px;flex-shrink:0;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .seat-dots{display:flex;gap:2px;flex:1;flex-wrap:wrap;min-height:13px}
  .sd{width:12px;height:12px;border-radius:2px;flex-shrink:0}
  .sd.empty{background:#2217140d}
  .seat-cnt{font-size:11.5px;font-weight:900;min-width:22px;text-align:right;color:var(--ink-soft)}
  .seat-row.gr .seat-party{color:var(--accent-deep);font-weight:900}
  .seat-row.gr .seat-cnt{color:var(--accent-deep)}
  .seat-below-group{font-size:10px;font-weight:600;color:var(--ink-soft);margin-top:5px;padding-top:5px;
    border-top:1px solid var(--line-soft);line-height:1.6}
  .seat-pending{font-size:11px;color:var(--ink-soft);text-align:center;padding:6px 0;font-weight:600}

  /* counting rate */
  .crate{padding:12px 18px 6px}
  .crate-top{display:flex;justify-content:space-between;align-items:baseline;font-weight:700;letter-spacing:-0.03em}
  .crate-top .l{font-size:11px;color:var(--ink-soft)}
  .crate-top .v{font-size:14px}
  .crate-bar{height:6px;background:#2217140d;border-radius:4px;overflow:hidden;margin-top:6px}
  .crate-fill{height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));border-radius:4px;
    width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}

  /* candidate list */
  .clist{padding:8px 18px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
  .crow-top{display:flex;align-items:baseline;gap:7px;margin-bottom:4px}
  .crow .rk{font-size:11px;font-weight:900;color:#bcb3ad;width:15px;flex:0 0 auto}
  .crow .nm{font-size:13.5px;font-weight:800;letter-spacing:-0.03em}
  .crow .pty{font-size:10.5px;font-weight:600;color:var(--ink-soft);opacity:.85}
  .crow .sp{margin-left:auto;display:flex;align-items:baseline;gap:6px}
  .crow .pc{font-size:14px;font-weight:900;letter-spacing:-0.04em}
  .crow .vt{font-size:10.5px;font-weight:600;color:var(--ink-soft)}
  .crow-bar{height:7px;background:#2217140a;border-radius:4px;overflow:hidden;margin-left:22px}
  .crow-fill{height:100%;border-radius:4px;width:0;transition:width .7s cubic-bezier(.4,0,.2,1)}
  .crow.green .nm{color:var(--accent-deep)}
  .crow.green{background:#00a1670a;margin:0 -8px;padding:6px 8px;border-radius:9px}

  .c-foot{padding:11px 18px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;
    align-items:center;font-size:11px;font-weight:600;color:var(--ink-soft)}
  .c-status{display:inline-flex;align-items:center;gap:6px}
  .c-status .sd-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .c-status.done .sd-dot{background:#2217143a}

  .empty{padding:34px 18px;text-align:center;color:var(--ink-soft)}
  .empty .big{font-size:15px;font-weight:800;letter-spacing:-0.04em}
  .empty .sm{font-size:12px;margin-top:5px;opacity:.8}

  footer.foot{max-width:1480px;margin:0 auto;padding:0 clamp(14px,3vw,40px) 40px;
    font-size:11.5px;font-weight:600;color:var(--ink-soft);display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:6px;opacity:.85}

  /* ── 당선 예측 ── */
  .pred-section{padding:12px 18px 10px;border-bottom:1px solid var(--line-soft)}
  .pred-label-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
  .pred-tag{font-size:13px;font-weight:900;letter-spacing:-.03em;padding:5px 14px;border-radius:999px;color:#fff;flex-shrink:0}
  .pred-rank{font-size:12px;font-weight:700;color:var(--ink-soft)}
  .pred-detail{font-size:11px;font-weight:600;color:var(--ink-soft);line-height:1.5}
  .pred-bar-wrap{height:5px;background:#2217140d;border-radius:4px;overflow:hidden;margin-top:6px}
  .pred-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}

  /* ── 채팅 ── */
  /* ── 선거구별 관리자 모드 바 ── */
  .district-mode-bar{display:none;padding:6px 14px 0;gap:6px;flex-wrap:wrap}
  .admin-active .district-mode-bar{display:flex}
  .dm-btn{appearance:none;border:1.5px solid var(--line);background:#fff;
    font-family:inherit;font-size:11px;font-weight:700;color:var(--ink-soft);
    padding:3px 10px;border-radius:999px;cursor:pointer;transition:.15s;letter-spacing:-.02em}
  .dm-btn:hover{border-color:var(--accent);color:var(--accent)}
  .dm-btn.on-crawl{border-color:var(--accent);background:var(--accent);color:#fff}
  .dm-btn.on-manual{border-color:#2563eb;background:#2563eb;color:#fff}
  .dm-btn.on-error{border-color:#dc2626;background:#dc2626;color:#fff}
  .error-card-notice{padding:20px 18px;text-align:center;color:#dc2626;
    font-size:13px;font-weight:800;letter-spacing:-.03em}

  .chat-bubble{position:fixed;top:100px;right:24px;z-index:8000;
    width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;
    border:0;font-size:22px;cursor:pointer;display:grid;place-items:center;
    box-shadow:0 4px 18px #00a16744;transition:transform .18s,box-shadow .18s;font-family:inherit}
  .chat-bubble:hover{transform:scale(1.08);box-shadow:0 6px 24px #00a16766}
  .chat-badge{position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;border-radius:999px;
    background:#e0162b;color:#fff;font-size:10px;font-weight:900;display:none;
    align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg)}
  .chat-badge.show{display:flex}
  .chat-panel{position:fixed;top:162px;right:24px;z-index:8001;
    width:340px;height:480px;background:#fff;border-radius:18px;
    box-shadow:0 12px 48px #00000022;display:none;flex-direction:column;
    font-family:Pretendard,sans-serif;overflow:hidden;border:1px solid var(--line)}
  .chat-panel.open{display:flex}
  .chat-head{padding:14px 16px;background:var(--ink);color:#fff;
    display:flex;align-items:center;gap:10px;flex-shrink:0}
  .chat-head-title{font-weight:800;font-size:14px;letter-spacing:-.04em;flex:1}
  .chat-head-sub{font-size:10.5px;opacity:.65;font-weight:600}
  .chat-x{appearance:none;border:0;background:transparent;color:#fff;font-size:18px;
    cursor:pointer;padding:2px 6px;border-radius:6px;opacity:.7;line-height:1}
  .chat-x:hover{opacity:1}
  .chat-nick-bar{padding:10px 14px;border-bottom:1px solid var(--line-soft);
    display:flex;align-items:center;gap:8px;flex-shrink:0;background:#fafaf8}
  .chat-nick-bar label{font-size:11px;font-weight:700;color:var(--ink-soft);white-space:nowrap}
  .chat-nick-in{flex:1;font-family:inherit;font-size:12px;font-weight:600;
    border:1.5px solid #2217141f;border-radius:8px;padding:5px 9px;color:var(--ink);min-width:0}
  .chat-nick-in:focus{outline:none;border-color:var(--accent)}
  .chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px}
  .chat-msg{max-width:88%}
  .chat-msg.me{align-self:flex-end}
  .chat-msg-meta{font-size:10px;font-weight:700;color:var(--ink-soft);margin-bottom:2px;
    display:flex;align-items:center;gap:5px}
  .chat-msg.me .chat-msg-meta{justify-content:flex-end}
  .chat-admin-tag{background:var(--accent);color:#fff;font-size:9px;font-weight:900;
    padding:1px 5px;border-radius:4px;letter-spacing:-.01em}
  .chat-bubble-msg{display:inline-block;padding:7px 11px;border-radius:12px;
    font-size:13px;font-weight:600;line-height:1.45;word-break:break-word;
    background:#f0f0ea;color:var(--ink)}
  .chat-msg.me .chat-bubble-msg{background:var(--accent);color:#fff}
  .chat-msg.admin-msg .chat-bubble-msg{background:var(--ink);color:#fff}
  .chat-msg.admin-msg.me .chat-bubble-msg{background:var(--accent-deep);color:#fff}
  .chat-time{font-size:9.5px;font-weight:600;color:var(--ink-soft);margin-top:2px;opacity:.7}
  .chat-msg.me .chat-time{text-align:right}
  .chat-input-bar{padding:10px 12px;border-top:1px solid var(--line-soft);
    display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#fafaf8}
  .chat-text-in{flex:1;font-family:inherit;font-size:13px;font-weight:600;
    border:1.5px solid #2217141f;border-radius:10px;padding:8px 11px;
    resize:none;height:38px;max-height:90px;color:var(--ink);line-height:1.4;overflow-y:auto}
  .chat-text-in:focus{outline:none;border-color:var(--accent)}
  .chat-send{appearance:none;border:0;background:var(--accent);color:#fff;
    border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer;
    flex-shrink:0;display:grid;place-items:center;transition:.15s}
  .chat-send:hover{background:var(--accent-deep)}
  .chat-send:disabled{opacity:.4;cursor:default}
  .chat-empty{text-align:center;color:var(--ink-soft);font-size:12px;font-weight:600;
    opacity:.7;margin:auto;padding:20px 0}
  .chat-pinned{background:#f0fdf4;border-bottom:1px solid #86efac55;padding:8px 14px;
    font-size:12px;flex-shrink:0;display:none}
  .chat-pinned.show{display:block}
  .chat-pinned-label{font-size:10px;font-weight:900;color:var(--accent-deep);
    display:flex;align-items:center;gap:5px;margin-bottom:3px}
  .chat-pinned-text{font-weight:600;color:var(--ink);line-height:1.4;word-break:break-word}
  .chat-pinned-nick{font-size:10px;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .chat-mod{display:none;gap:4px;margin-top:4px}
  .admin-active .chat-mod{display:flex}
  .chat-mod-btn{appearance:none;border:1.5px solid #2217141a;background:transparent;
    font-family:inherit;font-size:10px;font-weight:700;color:var(--ink-soft);
    padding:2px 7px;border-radius:5px;cursor:pointer;transition:.15s}
  .chat-mod-btn:hover{border-color:var(--accent);color:var(--accent)}
  .chat-mod-btn.del:hover{border-color:#e0162b;color:#e0162b}
  .chat-mod-btn.block-btn:hover{border-color:#c2410c;color:#c2410c}

  /* admin login modal */
  .al-modal{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;
    background:#221714bb;backdrop-filter:blur(4px);font-family:Pretendard,sans-serif}
  .al-modal.open{display:flex}
  .al-box{background:#fff;border-radius:18px;padding:30px 28px;width:min(360px,92vw);box-shadow:0 24px 60px #00000030}
  .al-title{font-size:17px;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
  .al-sub{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:18px}
  .al-input{width:100%;padding:11px 14px;border:1.5px solid #2217141f;border-radius:10px;
    font-family:inherit;font-size:14px;font-weight:600;outline:none;margin-bottom:10px}
  .al-input:focus{border-color:var(--accent)}
  .al-err{font-size:12px;color:#e0162b;font-weight:700;min-height:16px;margin-bottom:8px}
  .al-btns{display:flex;gap:8px;justify-content:flex-end}
  .al-cancel{appearance:none;border:1.5px solid #2217141f;background:transparent;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--ink-soft);
    padding:8px 16px;border-radius:999px;cursor:pointer}
  .al-ok{appearance:none;border:0;background:var(--accent);color:#fff;
    font-family:inherit;font-size:13px;font-weight:800;padding:8px 20px;border-radius:999px;cursor:pointer}
  .al-ok:hover{filter:brightness(1.06)}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="top-title" id="brandLogo" title="관리자: 로고를 두 번 클릭" style="cursor:pointer;user-select:none">녹색당 2026 지방선거 <b>개표 현황판</b></div>
    <div class="top-right">
      <div style="text-align:right">
      <div id="turnoutInfo" style="font-size:12.5px;font-weight:700;opacity:.9;line-height:1.55"></div>
      <div id="turnoutEditArea" style="display:none;margin-top:5px">
        <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;flex-wrap:wrap">
          <input id="turnoutRateIn" type="number" step="0.1" min="0" max="100" placeholder="투표율 %"
            style="width:90px;padding:4px 8px;border:1.5px solid #ffffff55;border-radius:7px;
            background:transparent;color:#fff;font-family:inherit;font-size:12px;font-weight:700;text-align:right"/>
          <input id="turnoutAsOfIn" type="text" placeholder="기준시각 (예: 오전 10시)"
            style="width:140px;padding:4px 8px;border:1.5px solid #ffffff55;border-radius:7px;
            background:transparent;color:#fff;font-family:inherit;font-size:12px;font-weight:600"/>
          <button onclick="saveTurnoutManual()"
            style="appearance:none;border:0;background:#00a167;color:#fff;font-family:inherit;
            font-size:11px;font-weight:800;padding:4px 11px;border-radius:7px;cursor:pointer">저장</button>
          <button onclick="clearTurnoutManual()"
            style="appearance:none;border:1.5px solid #ffffff55;background:transparent;color:#ffffffaa;
            font-family:inherit;font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;cursor:pointer">자동</button>
        </div>
      </div>
    </div>
      <span class="live"><span class="d"></span>LIVE</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-in" id="controlsIn">

<script>
/* =====================================================================
   GBoard — 2026 지방선거 녹색당 개표 현황판
   크롤링 기본값: /api/gboard (server.py 와 같은 서버)
===================================================================== */
window.GBoard = (function () {
  "use strict";

  var DEMO_TICK = 4;
  var REAL_TICK = 15;
  var DEMO_STEP = 0.082;

  var ELECTION = { title: "제9회 전국동시지방선거", date: "2026. 6. 3. (수)", party: "녹색당" };

  var PARTY_COLORS = {
    "녹색당":"#00a167","더불어민주당":"#152484","국민의힘":"#E61E2B",
    "조국혁신당":"#06275A","개혁신당":"#FF7920","진보당":"#D6001C",
    "기본소득당":"#00D2C3","사회민주당":"#F2779A","무소속":"#9a9a9a"
  };

  function colorOf(party, idx) {
    if (party) for (var k in PARTY_COLORS) if (party.indexOf(k) > -1) return PARTY_COLORS[k];
    return ["#00a167","#152484","#E61E2B","#FF7920","#06275A","#9a9a9a"][idx % 6];
  }

  /* ── 3개 선거구 ────────────────────────────────────────────
     candidateName: PR 선거구에서 영웅 섹션에 표시할 실제 후보 이름
  ─────────────────────────────────────────────────────────── */
  var DISTRICTS = [
    {
      id:0, region:"경상북도 안동시", regionShort:"안동",
      title:"안동시 마선거구", typeLabel:"기초의회의원",
      headerTitle:"경상북도 안동시",
      type:"local", seats:2, pace:1.0, finalTotal:0,
      candidates:[
        {name:"심재한", party:"더불어민주당", votes:0, isGreen:false, number:"1"},
        {name:"김창현", party:"국민의힘",     votes:0, isGreen:false, number:"2-가"},
        {name:"권용덕", party:"국민의힘",     votes:0, isGreen:false, number:"2-나"},
        {name:"허승규", party:"녹색당",       votes:0, isGreen:true,  number:"5"},
        {name:"장원호", party:"무소속",       votes:0, isGreen:false, number:"6"}
      ]
    },
    {
      id:1, region:"제주특별자치도", regionShort:"제주",
      title:"광역의회의원 비례대표", typeLabel:"광역 비례대표",
      headerTitle:"제주특별자치도의회 비례대표", hideTypeLabel:true,
      type:"pr", threshold:5.0, prSeats:13, pace:1.0, finalTotal:0,
      candidates:[
        {name:"더불어민주당", party:"더불어민주당", votes:0, isGreen:false, number:"1"},
        {name:"국민의힘",     party:"국민의힘",     votes:0, isGreen:false, number:"2"},
        {name:"조국혁신당",   party:"조국혁신당",   votes:0, isGreen:false, number:"3"},
        {name:"개혁신당",     party:"개혁신당",     votes:0, isGreen:false, number:"4"},
        {name:"진보당",       party:"진보당",       votes:0, isGreen:false, number:"5"},
        {name:"기본소득당",   party:"기본소득당",   votes:0, isGreen:false, number:"6"},
        {name:"녹색당",       party:"녹색당",       votes:0, isGreen:true,  number:"7", candidateName:"김순애"}
      ]
    },
    {
      id:2, region:"서울특별시 강서구", regionShort:"강서",
      title:"강서구 라선거구", typeLabel:"기초의회의원",
      headerTitle:"서울특별시 강서구",
      type:"local", seats:3, pace:1.0, finalTotal:0,
      candidates:[
        {name:"김현희", party:"더불어민주당", votes:0, isGreen:false, number:"1-가"},
        {name:"양진석", party:"더불어민주당", votes:0, isGreen:false, number:"1-나"},
        {name:"김민석", party:"국민의힘",     votes:0, isGreen:false, number:"2-가"},
        {name:"안도연", party:"국민의힘",     votes:0, isGreen:false, number:"2-나"},
        {name:"김삼렬", party:"조국혁신당",   votes:0, isGreen:false, number:"3"},
        {name:"김유리", party:"녹색당",       votes:0, isGreen:true,  number:"5"},
        {name:"김동수", party:"무소속",       votes:0, isGreen:false, number:"6"}
      ]
    }
  ];

  var LS_KEY = "gboard.state.v2";
  var state = {
    mode:"crawl", progress:0, running:true, cycle:0, countdown:REAL_TICK,
    manual:null,
    crawl:{ url:"/api/gboard", interval:15 },
    crawlData:null, crawlStatus:{ ok:false, msg:"대기 중", time:"" },
    history:[[],[],[]],
    lastUpdateTime: null,
    logs: [],
    districtForce: {}  // {id: null | 'error' | 'manual'} — null이면 글로벌 모드 따름
  };

  function now(){ return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

  function load(){
    try{
      var raw=localStorage.getItem(LS_KEY);
      if(raw){
        var s=JSON.parse(raw);
        state.mode    = s.mode    || "crawl";
        state.progress= s.progress|| 0;
        state.running = s.running !== false;
        state.cycle   = s.cycle   || 0;
        state.manual        = s.manual        || null;
        state.history       = s.history       || [[],[],[]];
        state.districtForce = s.districtForce || {};
        if(s.crawl && s.crawl.url) state.crawl = s.crawl;
      }
    }catch(e){}
    if(!state.crawl || !state.crawl.url) state.crawl={url:"/api/gboard",interval:15};
    else if(state.crawl.interval >= 60) state.crawl.interval=15; // 구버전 60s → 15s 마이그레이션
  }
  function save(){
    try{ localStorage.setItem(LS_KEY,JSON.stringify({
      mode:state.mode,progress:state.progress,running:state.running,
      cycle:state.cycle,manual:state.manual,crawl:state.crawl,history:state.history,
      districtForce:state.districtForce
    }));}catch(e){}
  }

  /* ── 의석 배분 계산 (제주 비례 13석, 엑셀 로직 동일) ─────── */
  function calcSeats(candidates, totalSeats){
    var THRESHOLD = 5.0;
    var ps = candidates.map(function(c){
      return { name:c.name, party:c.party, pct:c.pct||0, isGreen:!!c.isGreen,
               elig: (c.pct||0) >= THRESHOLD };
    });
    var sumElig = ps.reduce(function(s,p){ return s + (p.elig?p.pct:0); }, 0);
    ps.forEach(function(p){
      p.adj   = (p.elig && sumElig>0) ? p.pct/sumElig : 0;
      p.calc  = p.adj * totalSeats;
      p.first = Math.floor(p.calc);
      p.dec   = p.elig ? (p.calc - p.first) : -1;
      p.seats = p.first;
    });
    var used = ps.reduce(function(s,p){ return s+p.first; }, 0);
    var rem  = totalSeats - used;
    var eligSorted = ps.filter(function(p){ return p.elig; })
                       .sort(function(a,b){ return b.dec - a.dec; });
    eligSorted.slice(0, rem).forEach(function(p){ p.seats++; });
    return ps;
  }

  /* ── 데모 ────────────────────────────────────────────────── */
  function wobble(p, seed){
    if(seed==null) seed=1;
    return 1 + (1-p)*0.26 * Math.sin(seed*3.1 + p*7.5);
  }

  function snapDistrict(d){
    var p=state.progress, rate=Math.max(0,Math.min(100,p*100*d.pace));
    if(p<=0) rate=0;
    var cur=d.candidates.map(function(c,i){
      var w=wobble(p, c.seed!=null?c.seed:(i+1)*0.6);
      return {name:c.name,party:c.party,isGreen:c.isGreen,votes:Math.max(0,Math.round(c.votes*p*w))};
    });
    var total=cur.reduce(function(a,c){return a+c.votes;},0);
    cur.forEach(function(c){c.pct=total>0?(c.votes/total)*100:0;});
    cur.sort(function(a,b){return b.votes-a.votes;});
    cur.forEach(function(c,i){c.rank=i+1;});
    return finalize(d,cur,rate,total, rate<0.5?"집계전":rate<99.5?"개표중":"개표완료");
  }

  function finalize(d, cur, rate, total, status){
    var green=null;
    cur.forEach(function(c){if(c.isGreen)green=c;});
    var done=status==="개표완료";

    // ── 당선권 판단 (부정 레이블 없음) ──────────────────────
    var win={state:"none", label:"", seatText:"", seats:0};
    if(green && status!=="집계전"){
      if(d.type==="local"){
        var inZone=green.rank<=d.seats;
        win.seatText = d.seats+"인 선거구 · 현재 "+green.rank+"위";
        win.state    = inZone?"in":"none";
        win.label    = inZone?(done?"당선":"당선권"):"";
      } else {
        // PR: 의석 배분 계산
        var seatResult=calcSeats(cur, d.prSeats||13);
        var gs=seatResult.filter(function(p){return p.isGreen;})[0];
        var hasSeats=gs&&gs.seats>=1;
        win.seats    = gs?gs.seats:0;
        win.seatText = "비례 "+(d.prSeats||13)+"석 · 예상 "+win.seats+"석";
        win.state    = hasSeats?"in":"none";
        win.label    = hasSeats?(done?"비례 당선":"당선권"):"";
      }
    }
    return {
      id:d.id, region:d.region, regionShort:d.regionShort||d.region,
      title:d.title, typeLabel:d.typeLabel, type:d.type,
      seats:d.seats, threshold:d.threshold, prSeats:d.prSeats,
      countingRate:rate, totalVotes:total, status:status,
      candidates:cur, green:green, win:win,
      seatCalc: d.type==="pr" ? calcSeats(cur, d.prSeats||13) : null
    };
  }

  /* ── 수동 ────────────────────────────────────────────────── */
  function snapManual(d){
    var m=state.manual&&state.manual[d.id];
    if(!m){
      return finalize(d,d.candidates.map(function(c){
        return {name:c.name,party:c.party,isGreen:c.isGreen,votes:0,pct:0,rank:0};
      }),0,0,"집계전");
    }
    var cur=(m.candidates||[]).map(function(c){
      return {name:c.name,party:c.party,isGreen:!!c.isGreen,votes:+c.votes||0};
    });
    var total=cur.reduce(function(a,c){return a+c.votes;},0);
    cur.forEach(function(c){c.pct=total>0?(c.votes/total)*100:0;});
    cur.sort(function(a,b){return b.votes-a.votes;});
    cur.forEach(function(c,i){c.rank=i+1;});
    var rate=Math.max(0,Math.min(100,+m.countingRate||0));
    var status=m.status||(rate<0.5?"집계전":rate<99.5?"개표중":"개표완료");
    var result=finalize(d,cur,rate,total,status);
    result.invalidVotes=+m.invalidVotes||0;
    result.voterCount=+m.voterCount||0;
    return result;
  }

  /* ── 크롤링 ─────────────────────────────────────────────── */
  function normalizeCrawl(data){
    var arr=Array.isArray(data)?data:(data&&data.districts)||[];
    var map={};
    arr.forEach(function(row){
      if(!row||row.id==null) return;
      map[row.id]={
        countingRate:+row.countingRate||0, status:row.status||null,
        invalidVotes:+row.invalidVotes||0, voterCount:+row.voterCount||0,
        candidates:(row.candidates||[]).map(function(c){
          return { name:c.name||"", party:c.party||"",
                   votes:+c.votes||0,
                   isGreen:c.isGreen!=null?!!c.isGreen:(c.party&&c.party.indexOf("녹색")>-1) };
        })
      };
    });
    return map;
  }

  function fetchCrawl(){
    if(!state.crawl.url){ state.crawlStatus={ok:false,msg:"URL 미설정",time:now()}; broadcast(); return; }
    fetch(state.crawl.url,{cache:"no-store"})
      .then(function(res){ if(!res.ok) throw new Error("HTTP "+res.status); return res.json(); })
      .then(function(data){
        state.crawlData=normalizeCrawl(data);
        var t=now();
        state.lastUpdateTime=t;
        state.crawlStatus={ok:true,msg:"정상 수신",time:t};
        state.logs.push({t:t,ok:true,msg:"정상 수신 (선거구 "+Object.keys(state.crawlData).length+"개)"});
        if(state.logs.length>50) state.logs.shift();
        var snap=snapshot(); pushHistory(snap); broadcast();
      })
      .catch(function(e){
        var m=String(e&&e.message||e);
        if(/Failed to fetch|NetworkError|load failed/i.test(m)) m="서버 연결 실패 — python3 server.py 실행 확인";
        var t=now();
        state.crawlStatus={ok:false,msg:m,time:t};
        state.logs.push({t:t,ok:false,msg:m});
        if(state.logs.length>50) state.logs.shift();
        broadcast();
      });
  }

  function snapCrawl(d){
    var m=state.crawlData&&state.crawlData[d.id];
    if(!m){
      return finalize(d,d.candidates.map(function(c){
        return {name:c.name,party:c.party,isGreen:c.isGreen,votes:0,pct:0,rank:0};
      }),0,0,"집계전");
    }
    var cur=(m.candidates||[]).map(function(c){
      var displayName=c.name||"";
      // PR 선거구: 정당명으로 오는 이름을 DISTRICTS 의 name 으로 매핑
      if(d.type==="pr"){
        var local=d.candidates.filter(function(dc){
          return dc.party===c.party||dc.name===c.name||dc.party===c.name;
        })[0];
        if(local) displayName=local.name;
      }
      return {name:displayName, party:c.party, isGreen:!!c.isGreen||(c.party&&c.party.indexOf("녹색")>-1), votes:c.votes};
    });
    var total=cur.reduce(function(a,c){return a+c.votes;},0);
    cur.forEach(function(c){c.pct=total>0?(c.votes/total)*100:0;});
    cur.sort(function(a,b){return b.votes-a.votes;});
    cur.forEach(function(c,i){c.rank=i+1;});
    var rate=Math.max(0,Math.min(100,+m.countingRate||0));
    var status=m.status||(rate<0.5?"집계전":rate<99.5?"개표중":"개표완료");
    var result=finalize(d,cur,rate,total,status);
    result.invalidVotes=+m.invalidVotes||0;
    result.voterCount=+m.voterCount||0;
    return result;
  }

  function snapOne(d){
    var force = state.districtForce[d.id];
    if(force === 'error'){
      // 오류 모드: 후보자 이름은 유지하되 득표 0, 상태 오류
      var zeroCands = d.candidates.map(function(c){
        return {name:c.name,party:c.party,isGreen:c.isGreen,votes:0,pct:0,rank:0};
      });
      return finalize(d, zeroCands, 0, 0, '데이터 수신 실패');
    }
    if(force === 'manual') return snapManual(d);
    if(state.mode==="manual") return snapManual(d);
    if(state.mode==="crawl")  return snapCrawl(d);
    return snapDistrict(d);
  }

  function snapshot(){
    var ds=DISTRICTS.map(function(d){ return snapOne(d); });
    return { meta:ELECTION, mode:state.mode, running:state.running,
             cycle:state.cycle, countdown:state.countdown, tick:tickFor(state.mode),
             crawlStatus:state.crawlStatus, crawl:state.crawl,
             districts:ds, history:state.history.map(function(h){return h.slice();}),
             lastUpdateTime:state.lastUpdateTime, logs:state.logs.slice(-20) };
  }

  function tickFor(m){ if(m==="manual") return REAL_TICK; if(m==="crawl") return state.crawl.interval||60; return DEMO_TICK; }

  var subs=[];
  function broadcast(){ var snap=snapshot(); subs.forEach(function(cb){try{cb(snap);}catch(e){}}); }
  function subscribe(cb){ subs.push(cb); cb(snapshot()); return function(){subs=subs.filter(function(x){return x!==cb;});}; }

  function pushHistory(snap){
    snap.districts.forEach(function(ds,i){
      var g=ds.green?+ds.green.pct.toFixed(2):0;
      state.history[i].push(g);
      if(state.history[i].length>40) state.history[i].shift();
    });
  }

  var loop=null;
  function startLoop(){
    if(loop) clearInterval(loop);
    loop=setInterval(function(){
      state.countdown-=1;
      if(state.countdown<=0){ advance(); } else { broadcast(); }
    },1000);
  }
  function advance(){
    state.cycle+=1; state.countdown=tickFor(state.mode);
    if(state.mode==="demo"&&state.running){ state.progress=Math.min(1,state.progress+DEMO_STEP); state.lastUpdateTime=now(); }
    if(state.mode==="crawl") fetchCrawl();
    var snap=snapshot(); pushHistory(snap); save(); broadcast();
  }

  function setMode(m){
    state.mode=m; state.countdown=tickFor(m);
    if(m==="manual"&&!state.manual){
      state.manual={};
      DISTRICTS.forEach(function(d){
        state.manual[d.id]={countingRate:0,status:"집계전",
          candidates:d.candidates.map(function(c){return {name:c.name,party:c.party,isGreen:c.isGreen,votes:0};})};
      });
    }
    if(m==="crawl") fetchCrawl();
    save(); broadcast();
  }

  var api={
    ELECTION:ELECTION, colorOf:colorOf, PARTY_COLORS:PARTY_COLORS,
    calcSeats:calcSeats,
    rawDistricts:function(){return DISTRICTS;},
    subscribe:subscribe, snapshot:snapshot,
    forceRefresh:function(){advance();},
    play:function(){state.running=true;if(state.mode!=="demo")setMode("demo");save();broadcast();},
    pause:function(){state.running=false;save();broadcast();},
    togglePlay:function(){state.running?api.pause():api.play();},
    resetDemo:function(){state.progress=0;state.cycle=0;state.countdown=DEMO_TICK;state.history=[[],[],[]];save();broadcast();},
    setMode:setMode,
    setProgress:function(p){state.progress=Math.max(0,Math.min(1,p));save();broadcast();},
    getMode:function(){return state.mode;},
    isRunning:function(){return state.running;},
    setManual:function(id,data){if(!state.manual)state.manual={};state.manual[id]=data;state.lastUpdateTime=now();save();broadcast();},
    getManual:function(id){return state.manual&&state.manual[id];},
    setCrawl:function(cfg){state.crawl={url:(cfg.url||"").trim(),interval:Math.max(3,+cfg.interval||60)};save();broadcast();},
    getCrawl:function(){return state.crawl;},
    getCrawlStatus:function(){return state.crawlStatus;},
    getLogs:function(){return state.logs.slice();},
    updateCandidates:function(id, newCands){
      var d=DISTRICTS.find(function(x){return x.id===id;});
      if(!d||!newCands||!newCands.length) return;
      // 기존 seed·pace 등 메타 보존, 이름·정당·isGreen만 덮어씀
      d.candidates=newCands.map(function(c){
        var old=d.candidates.find(function(e){return e.name===c.name;});
        return Object.assign({}, old||{}, {name:c.name, party:c.party, isGreen:!!c.isGreen, votes:0});
      });
      broadcast();
    },
    setDistrictForce:function(id,force){
      // force: null(글로벌 모드) | 'manual' | 'error'
      state.districtForce[id]=force;
      save(); broadcast();
    },
    getDistrictForce:function(id){return state.districtForce[id]||null;},
    crawlNow:function(){fetchCrawl();},
    testCrawl:function(url){
      return fetch((url||state.crawl.url),{cache:"no-store"})
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
        .then(function(d){var m=normalizeCrawl(d);return{ok:true,count:Object.keys(m).length,sample:m};});
    },
    seedManualFromDemo:function(){
      if(!state.manual)state.manual={};
      DISTRICTS.forEach(function(d){
        var s=snapDistrict(d);
        state.manual[d.id]={countingRate:+s.countingRate.toFixed(1),status:s.status,
          candidates:s.candidates.map(function(c){return{name:c.name,party:c.party,isGreen:c.isGreen,votes:c.votes};})};
      });
      save();broadcast();
    }
  };

  load(); startLoop();
  if(state.mode==="crawl") fetchCrawl();
  return api;
})();
</script>

    /* ── 관리자 → 서버 오버라이드 푸시 ── */
    var _lastPushedCycle = -1;
    function pushOverride(snap){
      if(!ADMIN_PW_CACHE) return;
      if(snap.mode==="crawl") return; // 크롤 모드는 NEC 데이터 그대로
      if(snap.cycle===_lastPushedCycle) return; // 같은 사이클 중복 방지
      _lastPushedCycle = snap.cycle;
      var payload = snap.districts.map(function(d){
        return {
          id: d.id,
          countingRate: +(d.countingRate||0).toFixed(1),
          status: d.status||'집계전',
          candidates: (d.candidates||[]).map(function(c){
            return {name:c.name, party:c.party, votes:c.votes||0, isGreen:!!c.isGreen};
          })
        };
      });
      fetch('/api/override',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:ADMIN_PW_CACHE, payload:payload})
      }).catch(function(){});
    }

    GBoard.subscribe(function(snap){
      var m=snap.mode;
      bDemo.classList.toggle("on",m==="demo");
      bMan.classList.toggle("on",m==="manual");
      bCrawl.classList.toggle("on",m==="crawl");
      bPlay.style.display=m==="demo"?"":"none";
      bReset.style.display=m==="demo"?"":"none";
      bEdit.style.display=m==="manual"?"":"none";
      bCrawlSet.style.display=m==="crawl"?"":"none";
      crawlStat.style.display=m==="crawl"?"":"none";
      bPlay.innerHTML=snap.running?"⏸ 일시정지":"▶ 재생";
      if(m==="crawl"&&snap.crawlStatus){
        var ok=snap.crawlStatus.ok;

  var modal=null;

    var x=el("button","gp-x","×");head.appendChild(x);
    var body=el("div","gp-body");
